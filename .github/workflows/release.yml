name: Release

on:
  push:
    tags: ['v*']
  # Build-only smoke test (no publish — see the `publish` job's tag guard).
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, target: win }
          - { os: macos-latest, target: mac }
          - { os: ubuntu-latest, target: linux }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Bundle the qpdf security sidecar (Apache-2.0) into the installer. Best
      # effort: macOS has no prebuilt (resolved from PATH / brew there instead).
      - name: Fetch qpdf sidecar
        continue-on-error: true
        run: npm run fetch:qpdf

      # Regenerate the committed app icons for reproducibility.
      - name: Generate icons
        run: npm run icon

      - name: Build
        run: npm run build

      # Package installers WITHOUT publishing (the publish job uploads them all
      # to one release atomically). Builds are UNSIGNED for now —
      # CSC_IDENTITY_AUTO_DISCOVERY=false skips macOS code-signing/notarization;
      # add CSC_LINK / APPLE_ID secrets later to sign without changing this file.
      - name: Package
        run: npx electron-builder --${{ matrix.target }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            release/*/*.exe
            release/*/*.exe.blockmap
            release/*/*.dmg
            release/*/*.dmg.blockmap
            release/*/*.zip
            release/*/*.zip.blockmap
            release/*/*.AppImage
            release/*/*.deb
            release/*/latest*.yml
          if-no-files-found: warn

  publish:
    name: Publish GitHub Release
    needs: build
    # Only publish for a real tag push; a manual workflow_dispatch is build-only.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          files=$(find dist -type f \( \
            -name '*.exe' -o -name '*.exe.blockmap' \
            -o -name '*.dmg' -o -name '*.dmg.blockmap' \
            -o -name '*.zip' -o -name '*.zip.blockmap' \
            -o -name '*.AppImage' -o -name '*.deb' \
            -o -name 'latest*.yml' \) | sort)
          echo "Publishing assets:"
          echo "$files"
          # --repo is explicit because this job has no checkout (no local .git).
          gh release create "$GITHUB_REF_NAME" $files \
            --repo "$GITHUB_REPOSITORY" \
            --title "Verso $GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag
