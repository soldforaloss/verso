name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    name: Build & publish Windows artifacts
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Bundle the qpdf security sidecar (Apache-2.0) into the installer.
      - name: Fetch qpdf sidecar
        run: npm run fetch:qpdf

      # Regenerate the committed app icons for reproducibility.
      - name: Generate icons
        run: npm run icon

      - name: Build
        run: npm run build

      # Package the installer, portable exe, and latest.yml (auto-update feed)
      # WITHOUT publishing. electron-builder's GitHub publisher uploads files
      # concurrently and can create two releases for the same tag when the
      # release doesn't yet exist (a known race), which splits the assets.
      - name: Package
        run: npx electron-builder --win --publish never

      # Publish everything to a single release in one atomic create — no race,
      # one release per tag, with all assets together.
      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          files=$(ls release/*/Verso-*.exe release/*/Verso-*.exe.blockmap release/*/latest.yml)
          echo "Publishing assets:"
          echo "$files"
          gh release create "$GITHUB_REF_NAME" $files \
            --title "Verso $GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag
