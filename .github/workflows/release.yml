name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    name: Build & publish Windows artifacts
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Bundle the qpdf security sidecar (Apache-2.0) into the installer.
      - name: Fetch qpdf sidecar
        run: npm run fetch:qpdf

      # Regenerate the committed app icons for reproducibility.
      - name: Generate icons
        run: npm run icon

      - name: Build
        run: npm run build

      # electron-builder reads `publish:` from electron-builder.yml and uploads
      # the NSIS installer, portable exe, and latest.yml (auto-update feed) to
      # the GitHub Release for this tag.
      - name: Package & publish
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
